# The field, once set to True in the config file, cannot be set to False via command-line arguments.

SERVER:
  HOST: '0.0.0.0' #127.0.0.1 for localhost. 0.0.0.0 for all network interfaces. However, seems HOST and PORT here have no impact
  PORT: 8000
  REQUEST_OUTPUT_QUEUE_TYPE: "zmq"
  RAY_CLUSTER_PORT: 6379
  LAUNCH_RAY_CLUSTER: False

MANAGER:
  INITIAL_INSTANCES: 2
  DISPATCH_POLICY: 'load'
  ENABLE_MIGRATION: True
  ENABLE_SCALING: False
  # Set LOG_INSTANCE_INFO: True to write instance CSV (for GPU utilization and Fig 12 plots).
  # CSV is written on the head node as <LOG_FILENAME>_instance.csv in the server's cwd.
  LOG_INSTANCE_INFO: True
  LOG_FILENAME: 'server.log'

INSTANCE:
  DISPATCH_LOAD_METRIC: 'remaining_steps'
  MIGRATION_LOAD_METRIC: 'remaining_steps'

  ENABLE_DEFRAG: True
  MIGRATION_BACKEND: 'gloo'
  MIGRATION_BUFFER_BLOCKS: 512
  REQUEST_MIGRATION_POLICY: 'SR'
